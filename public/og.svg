<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#131a28"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="70%">
      <stop offset="0" stop-color="#4d8bff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#4d8bff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#b9c6d6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- target mark -->
  <g transform="translate(150 250)">
    <circle cx="0" cy="0" r="78" fill="none" stroke="#2a3142" stroke-width="10"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#6ea8fe" stroke-width="10"/>
    <circle cx="0" cy="0" r="24" fill="none" stroke="#4d8bff" stroke-width="10"/>
    <circle cx="0" cy="0" r="9" fill="#6ea8fe"/>
  </g>

  <text x="270" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="72" font-weight="800" letter-spacing="-2" fill="url(#title)">Behavioural</text>
  <text x="270" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="72" font-weight="800" letter-spacing="-2" fill="url(#title)">Interview Prep</text>

  <text x="152" y="430" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="32" font-weight="500" fill="#9aa7b8">Values · Leadership · Management — answered with STAR</text>

  <!-- pills -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="26" font-weight="600">
    <rect x="152" y="490" width="190" height="56" rx="28" fill="#1c2230" stroke="#2a3142" stroke-width="2"/>
    <text x="247" y="527" fill="#e6edf3" text-anchor="middle">Leadership</text>
    <rect x="362" y="490" width="150" height="56" rx="28" fill="#1c2230" stroke="#2a3142" stroke-width="2"/>
    <text x="437" y="527" fill="#e6edf3" text-anchor="middle">Conflict</text>
    <rect x="532" y="490" width="200" height="56" rx="28" fill="#1c2230" stroke="#2a3142" stroke-width="2"/>
    <text x="632" y="527" fill="#e6edf3" text-anchor="middle">Teamwork</text>
    <rect x="752" y="490" width="230" height="56" rx="28" fill="#1c2230" stroke="#2a3142" stroke-width="2"/>
    <text x="867" y="527" fill="#e6edf3" text-anchor="middle">Ownership</text>
  </g>
</svg>
